# Regenerates the Go SDK from Vantage's OpenAPI spec and opens a PR.
#
# Triggered manually (workflow_dispatch) or by repository_dispatch from vantage-sh/core.
# By default generates against the production API at api.vantage.sh.

name: Sync SDK from vantage-core

on:
  repository_dispatch:
    types: [vantage-core-api-sync]
  workflow_dispatch:
    inputs:
      vantage_host:
        description: "Base URL for the Vantage API (e.g. https://api.vantage.sh)"
        required: false
        type: string
        default: "https://api.vantage.sh"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-and-pr:
    runs-on: ubuntu-latest
    env:
      VANTAGE_HOST: ${{ github.event.inputs.vantage_host || 'https://api.vantage.sh' }}
    steps:
      - name: Checkout vantage-go
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install go-swagger
        env:
          GO_SWAGGER_VERSION: v0.30.5
        run: |
          wget -q "https://github.com/go-swagger/go-swagger/releases/download/${GO_SWAGGER_VERSION}/swagger_linux_amd64"
          chmod +x swagger_linux_amd64
          sudo mv swagger_linux_amd64 /usr/local/bin/swagger

      - name: Generate SDK
        run: make generate SHELL=/bin/bash

      - name: Open pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No generated changes; skipping PR."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          SHORT_SHA="$(git rev-parse --short HEAD)"
          BRANCH="sync/api-client-${SHORT_SHA}"

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore: regenerate API client" \
            -m "Generated against ${VANTAGE_HOST}."

          git push -u origin "$BRANCH" --force-with-lease

          DEFAULT_BRANCH="$(gh api "repos/${{ github.repository }}" --jq '.default_branch')"

          EXISTING=$(gh api "repos/${{ github.repository }}/pulls" --paginate \
            --jq ".[] | select(.head.ref==\"$BRANCH\" and .state==\"open\") | .number" | head -1)

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base "$DEFAULT_BRANCH" \
              --head "$BRANCH" \
              --title "chore: regenerate API client" \
              --body "Automated regeneration of the Go SDK client from the Vantage OpenAPI spec."
          else
            echo "Open PR #${EXISTING} already exists for head ${BRANCH}; skipping create."
          fi
